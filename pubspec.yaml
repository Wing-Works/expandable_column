name: expandable_column
description: "An expandable Flutter column widget that supports scrolling while allowing Expanded and Spacer widgets. Perfect for responsive layouts that need to fill available space."
version: 0.0.1
homepage: https://github.com/Wing-Works/expandable_column
repository: https://github.com/Wing-Works/expandable_column

topics:
  - flutter
  - widget
  - layout
  - scrollable
  - column

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  meta: ">=1.0.0 <2.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0